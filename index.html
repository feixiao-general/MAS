<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAS档案库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            color: #00ff41;
            font-family: "Courier New", monospace;
            padding: 20px;
            line-height: 1.8;
        }
        h1 {
            margin-bottom: 30px;
            padding-bottom: 10px;
            border-bottom: 1px solid #00ff41;
        }
        .tip {
            color: #008f11;
            margin-bottom: 20px;
        }
        /* 文件夹网格 */
        .folder-wrap {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }
        .folder-item {
            border: 1px solid #00ff41;
            padding: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .folder-item:hover {
            background: #002200;
        }
        .folder-count {
            color: #008f11;
            font-size: 12px;
            margin-top: 6px;
        }
        /* 文件列表 */
        .file-area {
            margin-top: 20px;
        }
        .file-area h2 {
            margin: 10px 0;
            font-size: 18px;
        }
        .file-item {
            border: 1px solid #008f11;
            padding: 6px 12px;
            margin: 4px 0;
            width: fit-content;
            cursor: pointer;
        }
        .file-item:hover {
            background: #002200;
        }
        .hide {
            display: none;
        }
    </style>
</head>
<body>
    <h1>MAS档案库</h1>
    <p class="tip">点击文件夹查看异常档案</p>

    <div class="folder-wrap" id="folderContainer"></div>

    <div class="file-area hide" id="fileBox">
        <h2 id="nowFolder"></h2>
        <div id="fileList"></div>
    </div>

<script>
    const folderContainer = document.getElementById("folderContainer");
    const fileBox = document.getElementById("fileBox");
    const nowFolder = document.getElementById("nowFolder");
    const fileList = document.getElementById("fileList");
    let dirData = [];

    // 【读取 dir.json 的核心函数】
    async function initPage() {
        try {
            const res = await fetch("dir.json");
            dirData = await res.json();
            renderFolders();
        } catch (e) {
            folderContainer.innerHTML = "<p>加载目录配置失败，请检查 dir.json 文件</p>";
        }
    }

    // 渲染文件夹，并显示文件数量
    function renderFolders() {
        dirData.forEach(item => {
            const folderDom = document.createElement("div");
            folderDom.className = "folder-item";
            folderDom.innerHTML = `
                <div>📁 ${item.folderName}</div>
                <div class="folder-count">共 ${item.files.length} 个文档</div>
            `;
            folderDom.onclick = () => showFiles(item);
            folderContainer.appendChild(folderDom);
        });
    }

    // 展示当前文件夹下所有TXT文件
    function showFiles(folderInfo) {
        fileBox.classList.remove("hide");
        nowFolder.innerText = `当前目录：${folderInfo.folderName}`;
        fileList.innerHTML = "";

        folderInfo.files.forEach(txt => {
            const filePath = `${folderInfo.folderName}/${txt}`;
            const fileDom = document.createElement("div");
            fileDom.className = "file-item";
            fileDom.innerText = `📄 ${txt}`;
            fileDom.onclick = () => openTxt(filePath);
            fileList.appendChild(fileDom);
        });
    }

    // 新标签页打开TXT，黑底绿字保留原文
    function openTxt(filePath) {
        const newPage = `
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
    background: #000;
    color: #00ff41;
    font-family: "Courier New", monospace;
    padding: 20px;
    white-space: pre-wrap;
    font-size: 14px;
}
</style>
</head>
<body>
<script>
fetch("${filePath}")
.then(res => res.text())
.then(text => document.body.textContent = text)
.catch(() => document.body.textContent = "文件读取失败");
<\/script>
</body>
</html>`;
        const win = window.open("", "_blank");
        win.document.write(newPage);
        win.document.close();
    }

    window.onload = initPage;
</script>
</body>
</html>
